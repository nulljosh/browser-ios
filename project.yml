name: BrowseriOS
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "5.10"
  MARKETING_VERSION: "2.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  BrowseriOS:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - "icon.svg"
          - "Scripts"
          - "Tests"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.browser-ios
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
